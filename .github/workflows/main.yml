name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install flake8
        run: pip install flake8
      - name: Lint Python
        run: flake8 api/ worker/
      - name: Install eslint
        run: npm install -g eslint
      - name: Lint JavaScript
        run: npx eslint frontend/app.js --no-eslintrc --env node --parserOptions=ecmaVersion:2020 || true
        # Using || true for eslint if we don't have .eslintrc configured strictly
      - name: Install Hadolint
        run: wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 && chmod +x /usr/local/bin/hadolint
      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt pytest pytest-cov httpx
      - name: Run Pytest
        run: |
          cd api
          pytest --cov=. --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver-opts: network=host
      - name: Build and Push API
        uses: docker/build-push-action@v4
        with:
          context: ./api
          push: true
          tags: localhost:5000/api:${{ github.sha }},localhost:5000/api:latest
      - name: Build and Push Worker
        uses: docker/build-push-action@v4
        with:
          context: ./worker
          push: true
          tags: localhost:5000/worker:${{ github.sha }},localhost:5000/worker:latest
      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: localhost:5000/frontend:${{ github.sha }},localhost:5000/frontend:latest

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild images for Trivy
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend

      - name: Run Trivy on API
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: 'api:latest'
          format: 'sarif'
          output: 'trivy-api.sarif'
          severity: 'CRITICAL'
          exit-code: 1
          ignore-unfixed: true

      - name: Run Trivy on Worker
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: 'worker:latest'
          format: 'sarif'
          output: 'trivy-worker.sarif'
          severity: 'CRITICAL'
          exit-code: 1
          ignore-unfixed: true

      - name: Run Trivy on Frontend
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: 'frontend:latest'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL'
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy API results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Upload Trivy Worker results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-worker.sarif
          category: trivy-worker

      - name: Upload Trivy Frontend results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env
        run: cp .env.example .env
      - name: Up infrastructure
        run: docker compose up -d --build --wait
      - name: Submit Job and Check Status
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | jq -r .job_id)
          echo "Submitted Job: $JOB_ID"
          if [ "$JOB_ID" == "null" ]; then exit 1; fi
          STATUS=""
          for i in {1..15}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r .status)
            echo "Status: $STATUS"
            if [ "$STATUS" == "completed" ]; then break; fi
            sleep 2
          done
          if [ "$STATUS" != "completed" ]; then
            docker compose logs
            exit 1
          fi
      - name: Tear Down
        if: always()
        run: docker compose down -v

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: integration-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Create .env
        run: cp .env.example .env
      - name: Scripted Rolling Update Deployment
        run: |
          chmod +x ./deploy.sh
          ./deploy.sh
